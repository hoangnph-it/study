<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>study.primax.cloud — Site Index</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F1923;
    --card: #162231;
    --card2: #1E2D3D;
    --border: #2A3F55;
    --orange: #FF9900;
    --orange-dim: #CC7A00;
    --teal: #00BCD4;
    --blue: #1A73E8;
    --green: #4CAF50;
    --red: #FF5252;
    --yellow: #FFD54F;
    --white: #FFFFFF;
    --light: #B0BEC5;
    --dim: #8899AA;
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
    min-height: 100vh;
  }

  .infographic {
    max-width: 880px;
    margin: 0 auto;
    padding: 0 40px 60px;
  }

  .top-bar { height: 6px; background: var(--orange); }
</style>
</head>
<body>

<div class="top-bar"></div>

<div class="infographic">

  <!-- HEADER -->
  <div style="padding:48px 0 32px;">
    <span style="display:inline-block;padding:5px 18px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;background:var(--orange);color:var(--bg);">SITE INDEX</span>
    <h2 style="font-size:22px;font-weight:400;color:var(--dim);margin-top:24px;letter-spacing:1px;">WELCOME TO</h2>
    <h1 style="font-size:44px;font-weight:800;line-height:1.1;margin-top:8px;">study.primax<span style="color:var(--orange);">.cloud</span></h1>
    <p style="color:var(--dim);font-size:15px;margin-top:16px;">All folders and files — auto-generated from S3</p>
    <hr style="border:none;height:1px;background:var(--border);margin:24px 0;">
  </div>

  <!-- LOADING STATE -->
  <div id="loading" style="text-align:center;padding:40px 0;color:var(--dim);font-size:15px;">Loading file list…</div>

  <!-- CONTENT INJECTED HERE -->
  <div id="content"></div>

  <!-- BOTTOM BAR -->
  <div style="height:6px;background:var(--orange);margin-top:48px;"></div>
</div>

<script>
(async function() {
  const BUCKET_URL = 'https://study.primax.cloud';
  const IGNORE = ['index.html', '.DS_Store', 'LICENSE'];
  const COLORS = ['#FF9900','#00BCD4','#1A73E8','#4CAF50','#FF5252','#FFD54F'];

  // Friendly display names for folders
  const FOLDER_LABELS = {
    ai: 'AI',
    cooking: 'Cooking',
    english: 'English',
    health: 'Health',
    jerry: 'Jerry',
    planting: 'Planting'
  };

  // Friendly display names for files (filename without extension → label)
  const FILE_LABELS = {
    'midjourney-style-reference': 'Midjourney Style Reference — SREF Codes, Images & Advanced Techniques',
    'canh-cai-be-xanh': 'Canh Cải Bẹ Xanh — Vietnamese Mustard Green Soup',
    'canh-chua-ca-dieu-hong': 'Canh Chua Cá Diêu Hồng — 15-Minute Sour Fish Soup',
    'tap-huan-du-bi-doi-vien': 'Tập Huấn Dự Bị Đội Viên — Scout Training',
    'bat-benh-cho-trau-ba-vang': 'Bắt Bệnh Cho Trầu Bà Vàng — Pothos Plant Care'
  };

  function prettifyFilename(key) {
    const name = key.split('/').pop().replace(/\.[^.]+$/, '');
    if (FILE_LABELS[name]) return FILE_LABELS[name];
    return name.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function getExtension(key) {
    const ext = key.split('.').pop().toUpperCase();
    return ext || 'FILE';
  }

  try {
    // Fetch the static manifest generated before each deploy
    const res = await fetch(BUCKET_URL + '/manifest.json');
    const files = await res.json();

    // Group by top-level folder
    const folders = {};
    const rootFiles = [];

    files.forEach(key => {
      const parts = key.split('/');
      if (parts.length > 1 && parts[0]) {
        const folder = parts[0];
        if (!folders[folder]) folders[folder] = [];
        folders[folder].push(key);
      } else {
        rootFiles.push(key);
      }
    });

    const content = document.getElementById('content');
    let html = '';
    let colorIdx = 0;

    // Render each folder section
    const sortedFolders = Object.keys(folders).sort();
    sortedFolders.forEach(folder => {
      const color = COLORS[colorIdx % COLORS.length];
      const label = FOLDER_LABELS[folder] || folder.replace(/\b\w/g, c => c.toUpperCase());
      colorIdx++;

      html += `
        <div style="margin-bottom:44px;">
          <h3 style="font-size:24px;font-weight:800;letter-spacing:0.5px;margin-bottom:8px;">📂 ${label.toUpperCase()}</h3>
          <div style="width:60px;height:4px;border-radius:2px;margin-bottom:20px;background:${color};"></div>`;

      folders[folder].forEach(key => {
        const ext = getExtension(key);
        const displayName = prettifyFilename(key);
        html += `
          <a href="${key}" style="text-decoration:none;color:inherit;display:block;">
            <div style="display:flex;align-items:center;gap:14px;background:var(--card);border-radius:10px;padding:14px 18px;margin-bottom:10px;transition:transform 0.2s,box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(0,0,0,0.3)'" onmouseout="this.style.transform='none';this.style.boxShadow='none'">
              <div style="min-width:65px;text-align:center;">
                <span style="display:inline-block;padding:5px 18px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;background:${color};color:var(--bg);">${ext}</span>
              </div>
              <div>
                <div style="font-weight:700;font-size:14px;">${displayName}</div>
                <div style="color:var(--light);font-size:12.5px;">${key}</div>
              </div>
            </div>
          </a>`;
      });

      html += '</div>';
    });

    // Render root-level files if any
    if (rootFiles.length) {
      html += `
        <div style="margin-bottom:44px;">
          <h3 style="font-size:24px;font-weight:800;letter-spacing:0.5px;margin-bottom:8px;">📄 ROOT FILES</h3>
          <div style="width:60px;height:4px;border-radius:2px;margin-bottom:20px;background:var(--dim);"></div>`;

      rootFiles.forEach(key => {
        const ext = getExtension(key);
        const displayName = prettifyFilename(key);
        html += `
          <a href="${key}" style="text-decoration:none;color:inherit;display:block;">
            <div style="display:flex;align-items:center;gap:14px;background:var(--card);border-radius:10px;padding:14px 18px;margin-bottom:10px;transition:transform 0.2s,box-shadow 0.2s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(0,0,0,0.3)'" onmouseout="this.style.transform='none';this.style.boxShadow='none'">
              <div style="min-width:65px;text-align:center;">
                <span style="display:inline-block;padding:5px 18px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;background:var(--dim);color:var(--bg);">${ext}</span>
              </div>
              <div>
                <div style="font-weight:700;font-size:14px;">${displayName}</div>
                <div style="color:var(--light);font-size:12.5px;">${key}</div>
              </div>
            </div>
          </a>`;
      });

      html += '</div>';
    }

    // Show empty state if nothing found
    if (!html) {
      html = '<div style="text-align:center;padding:40px 0;color:var(--dim);font-size:15px;">No files found in bucket.</div>';
    }

    document.getElementById('loading').style.display = 'none';
    content.innerHTML = html;

  } catch (err) {
    document.getElementById('loading').innerHTML =
      '<div style="color:var(--red);font-size:14px;">Failed to load file list. Make sure the S3 bucket allows public listing.</div>' +
      '<div style="color:var(--dim);font-size:12px;margin-top:8px;">' + err.message + '</div>';
  }
})();
</script>

</body>
</html>
